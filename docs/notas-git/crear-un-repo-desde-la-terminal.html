    <h1>Crear un repo desde la terminal</h1>
    <p>privado</p>
<pre class="highlight"><code class="language-python">gh repo create nombre-repo --private --source=. --push</code></pre>
<p>público</p>
<pre class="highlight"><code class="language-python">gh repo create nombre-repo --public --source=. --push</code></pre>
<p>*Se necesita autenticación:</p>
<pre class="highlight"><code class="language-python">gh auth login</code></pre>
