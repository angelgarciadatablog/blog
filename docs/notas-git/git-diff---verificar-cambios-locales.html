    <h1>git diff - verificar cambios locales</h1>
    <p>Ver diferencia que se realizó en algún archivo (modificated)</p>
<pre class="highlight"><code class="language-bash">
git diff nombre-archivo</code></pre>
<p>Ver la diferencia entre los cambios remotos que no están en el local</p>
<pre class="highlight"><code class="language-bash">git fetch origin
git diff main origin/main</code></pre>
